<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        
    :root {
      --bg: #0a0e1a;
      --bg2: #111827;
      --bg3: #1a2236;
      --card: #141c2e;
      --border: rgba(99, 155, 255, 0.15);
      --accent1: #4f8ef7;
      --accent2: #38c9a8;
      --accent3: #f5a623;
      --accent4: #e4557a;
      --accent5: #a78bfa;
      --text: #e8edf5;
      --muted: #8899bb;
      --glow1: rgba(79, 142, 247, 0.25);
      --glow2: rgba(56, 201, 168, 0.2);
      --phase-a: #1e3a5f;
      --phase-b: #1a3d30;
      --radius: 14px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(10, 14, 26, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
    }

    .nav-logo {
      font-weight: 800;
      font-size: 14px;
      color: var(--accent1);
      letter-spacing: 0.05em;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
      font-weight: 500;
      transition: color .2s;
    }

    .nav-links a:hover {
      color: var(--accent1);
    }

    .nav-badge {
      background: linear-gradient(135deg, var(--accent1), var(--accent5));
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }

    /* ── LAYOUT ── */
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 80px 2rem 4rem;
    }

    section {
      margin-bottom: 5rem;
    }

    /* ── HERO ── */
    .hero {
      min-height: 88vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 2rem 0 4rem;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 20% 40%, rgba(79, 142, 247, 0.15) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 60%, rgba(56, 201, 168, 0.1) 0%, transparent 70%);
      animation: heroBg 8s ease-in-out infinite alternate;
    }

    @keyframes heroBg {
      from {
        opacity: .7;
      }

      to {
        opacity: 1;
      }
    }

    .hero-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 3rem;
      align-items: center;
    }

    .badge-row {
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid;
    }

    .badge-blue {
      color: var(--accent1);
      border-color: rgba(79, 142, 247, .4);
      background: rgba(79, 142, 247, .1);
    }

    .badge-green {
      color: var(--accent2);
      border-color: rgba(56, 201, 168, .4);
      background: rgba(56, 201, 168, .1);
    }

    .badge-orange {
      color: var(--accent3);
      border-color: rgba(245, 166, 35, .4);
      background: rgba(245, 166, 35, .1);
    }

    .badge-purple {
      color: var(--accent5);
      border-color: rgba(167, 139, 250, .4);
      background: rgba(167, 139, 250, .1);
    }

    .badge-red {
      color: var(--accent4);
      border-color: rgba(228, 85, 122, .4);
      background: rgba(228, 85, 122, .1);
    }

    h1.grant-title {
      font-size: clamp(2rem, 3.5vw, 2.8rem);
      font-weight: 900;
      line-height: 1.2;
      background: linear-gradient(135deg, #fff 30%, var(--accent1) 70%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.2rem;
    }

    .hero-sub {
      color: var(--muted);
      font-size: 16px;
      max-width: 600px;
      margin-bottom: 2rem;
    }

    .hero-meta {
      display: flex;
      flex-direction: column;
      gap: .5rem;
      font-size: 13.5px;
      color: var(--muted);
    }

    .hero-meta strong {
      color: var(--text);
    }

    /* applicant card */
    .applicant-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.8rem;
      box-shadow: 0 0 40px rgba(79, 142, 247, 0.12);
      position: relative;
      overflow: hidden;
    }

    .applicant-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent5));
    }

    .applicant-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .applicant-name {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: .3rem;
    }

    .applicant-name-jp {
      font-size: 13px;
      color: var(--accent2);
      margin-bottom: 1rem;
    }

    .app-row {
      display: flex;
      gap: .6rem;
      align-items: flex-start;
      margin-bottom: .5rem;
      font-size: 13px;
    }

    .app-label {
      color: var(--muted);
      min-width: 110px;
      font-weight: 500;
    }

    .app-val {
      color: var(--text);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1rem 0;
    }

    .deadline-box {
      background: rgba(228, 85, 122, .1);
      border: 1px solid rgba(228, 85, 122, .3);
      border-radius: 8px;
      padding: .7rem 1rem;
      font-size: 12.5px;
      color: var(--accent4);
      font-weight: 600;
    }

    /* ── SECTION HEADER ── */
    .sec-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .sec-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .sec-icon-blue {
      background: rgba(79, 142, 247, .15);
    }

    .sec-icon-green {
      background: rgba(56, 201, 168, .15);
    }

    .sec-icon-orange {
      background: rgba(245, 166, 35, .15);
    }

    .sec-icon-purple {
      background: rgba(167, 139, 250, .15);
    }

    .sec-icon-red {
      background: rgba(228, 85, 122, .15);
    }

    .sec-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
    }

    .sec-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    h2.sec-title {
      font-size: 1.5rem;
    }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.6rem;
      transition: border-color .25s, box-shadow .25s;
    }

    .card:hover {
      border-color: rgba(79, 142, 247, .35);
      box-shadow: 0 4px 30px rgba(79, 142, 247, .1);
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: .8rem;
    }

    .card-val {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--text);
    }

    .card-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: .3rem;
    }

    /* ── GRID LAYOUTS ── */
    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }

    .grid-23 {
      display: grid;
      grid-template-columns: 2fr 3fr;
      gap: 1.5rem;
    }

    @media(max-width:900px) {

      .grid-4,
      .grid-3,
      .grid-2,
      .grid-23 {
        grid-template-columns: 1fr;
      }

      .hero-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ── MOLECULE ANIMATION CARD ── */
    .mol-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .sequence-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13.5px;
      letter-spacing: .12em;
      background: rgba(79, 142, 247, .07);
      border: 1px solid rgba(79, 142, 247, .2);
      border-radius: 8px;
      padding: 1rem 1.2rem;
      word-break: break-all;
      line-height: 2.2;
    }

    .seq-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: .5rem;
    }

    .highlight-aa {
      background: rgba(56, 201, 168, .25);
      border-radius: 3px;
      padding: 0 1px;
      color: var(--accent2);
      font-weight: 700;
    }

    .highlight-knob {
      background: rgba(228, 85, 122, .2);
      border-radius: 3px;
      padding: 0 1px;
      color: var(--accent4);
      font-weight: 700;
    }

    /* ── MECHANISM DIAGRAM ── */
    .mechanism-svg {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      display: block;
    }

    /* ── TECH STACK ── */
    .tech-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      transition: all .25s;
      cursor: pointer;
    }

    .tech-item:hover {
      border-color: var(--accent1);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(79, 142, 247, .15);
    }

    .tech-icon {
      font-size: 1.8rem;
    }

    .tech-name {
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
    }

    .tech-desc {
      font-size: 12px;
      color: var(--muted);
    }

    .tech-tag {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: .07em;
    }

    /* ── WORKFLOW DECISION TREE ── */
    .workflow-container {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      overflow-x: auto;
    }

    .workflow-svg {
      min-width: 800px;
    }

    /* ── TIMELINE / PHASE ── */
    .phase-block {
      position: relative;
      padding: 0 0 0 2.5rem;
      border-left: 2px solid var(--border);
      padding-bottom: 2rem;
    }

    .phase-block::before {
      content: attr(data-num);
      position: absolute;
      left: -18px;
      top: 0;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
    }

    .phase-a::before {
      background: var(--accent1);
      color: #fff;
      box-shadow: 0 0 15px var(--glow1);
    }

    .phase-b::before {
      background: var(--accent2);
      color: #fff;
      box-shadow: 0 0 15px var(--glow2);
    }

    .phase-block h3 {
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: .6rem;
    }

    .phase-a h3 {
      color: var(--accent1);
    }

    .phase-b h3 {
      color: var(--accent2);
    }

    .phase-detail {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.2rem;
      margin-top: .8rem;
    }

    .phase-detail p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: .5rem;
    }

    .phase-detail li {
      font-size: 14px;
      color: var(--muted);
      margin-left: 1.2rem;
    }

    .aim-row {
      display: flex;
      gap: .8rem;
      align-items: flex-start;
      background: rgba(255, 255, 255, .03);
      border-radius: 8px;
      padding: .8rem 1rem;
      margin-bottom: .6rem;
      border: 1px solid rgba(255, 255, 255, .06);
    }

    .aim-num {
      font-size: 11px;
      font-weight: 800;
      color: #fff;
      min-width: 68px;
      padding: 3px 8px;
      border-radius: 4px;
      text-align: center;
    }

    .aim-a {
      background: var(--accent1);
    }

    .aim-b {
      background: var(--accent2);
      color: #111;
    }

    .aim-text {
      font-size: 14px;
      color: var(--text);
      flex: 1;
    }

    .aim-subtext {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── PRELIMINARY RESULTS ── */
    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.6rem;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: all .25s;
    }

    .result-card:hover {
      border-color: var(--accent1);
      box-shadow: 0 8px 40px rgba(79, 142, 247, .12);
    }

    .result-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
    }

    .rc-blue::before {
      background: var(--accent1);
    }

    .rc-green::before {
      background: var(--accent2);
    }

    .rc-orange::before {
      background: var(--accent3);
    }

    .rc-purple::before {
      background: var(--accent5);
    }

    .rc-red::before {
      background: var(--accent4);
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .result-icon {
      font-size: 2rem;
    }

    .result-status {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .status-done {
      background: rgba(56, 201, 168, .15);
      color: var(--accent2);
      border: 1px solid rgba(56, 201, 168, .3);
    }

    .status-prelim {
      background: rgba(245, 166, 35, .12);
      color: var(--accent3);
      border: 1px solid rgba(245, 166, 35, .25);
    }

    .status-ongoing {
      background: rgba(79, 142, 247, .12);
      color: var(--accent1);
      border: 1px solid rgba(79, 142, 247, .25);
    }

    .result-title {
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: .5rem;
    }

    .result-finding {
      font-size: 13.5px;
      color: var(--muted);
      margin-bottom: 1rem;
      line-height: 1.65;
    }

    .result-metric {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .metric {
      background: rgba(255, 255, 255, .04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .5rem .9rem;
    }

    .metric-val {
      font-size: 1.3rem;
      font-weight: 900;
    }

    .metric-lbl {
      font-size: 11px;
      color: var(--muted);
    }

    /* Chart bars */
    .bar-chart {
      margin-top: 1rem;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap .8rem;
      margin-bottom: .6rem;
    }

    .bar-label {
      font-size: 12px;
      color: var(--muted);
      min-width: 80px;
      text-align: right;
    }

    .bar-track {
      flex: 1;
      height: 20px;
      background: rgba(255, 255, 255, .05);
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      position: relative;
      transition: width 1.5s cubic-bezier(.4, 0, .2, 1);
    }

    .bar-fill::after {
      content: attr(data-val);
      position: absolute;
      right: 6px;
      top: 2px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
    }

    /* ── BUDGET ── */
    .budget-ring {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 1.5rem 0;
    }

    .budget-item {
      display: flex;
      align-items: center;
      gap: .7rem;
      padding: .6rem 0;
      border-bottom: 1px solid var(--border);
    }

    .budget-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .budget-name-col {
      flex: 1;
      font-size: 14px;
      color: var(--text);
    }

    .budget-pct {
      font-size: 13px;
      font-weight: 700;
      min-width: 42px;
      text-align: right;
    }

    .budget-amt {
      font-size: 12px;
      color: var(--muted);
      min-width: 72px;
      text-align: right;
    }

    /* ── PATENT ── */
    .patent-box {
      background: linear-gradient(135deg, rgba(167, 139, 250, .08), rgba(79, 142, 247, .06));
      border: 1px solid rgba(167, 139, 250, .3);
      border-radius: var(--radius);
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .patent-box::before {
      content: '⚖';
      position: absolute;
      right: 2rem;
      top: 1.5rem;
      font-size: 5rem;
      opacity: .06;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: .5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: .5rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all .2s;
    }

    .tab-btn.active,
    .tab-btn:hover {
      background: var(--accent1);
      border-color: var(--accent1);
      color: #fff;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
      animation: fadeIn .25s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    /* ── DECISION TREE ── */
    .dtree {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 1rem 0;
    }

    .dt-node {
      border-radius: 10px;
      padding: .9rem 1.4rem;
      text-align: center;
      font-weight: 700;
      font-size: 13.5px;
      position: relative;
      min-width: 220px;
      max-width: 340px;
    }

    .dt-start {
      background: linear-gradient(135deg, var(--accent1), var(--accent5));
      color: #fff;
      font-size: 15px;
    }

    .dt-phase1 {
      background: rgba(79, 142, 247, .15);
      border: 1.5px solid var(--accent1);
      color: var(--accent1);
    }

    .dt-phase2 {
      background: rgba(56, 201, 168, .12);
      border: 1.5px solid var(--accent2);
      color: var(--accent2);
    }

    .dt-decision {
      background: rgba(245, 166, 35, .1);
      border: 1.5px dashed var(--accent3);
      color: var(--accent3);
      border-radius: 50px;
      padding: .7rem 1.6rem;
      font-size: 13px;
    }

    .dt-outcome {
      background: rgba(167, 139, 250, .12);
      border: 1.5px solid var(--accent5);
      color: var(--accent5);
      font-size: 13px;
    }

    .dt-arrow {
      width: 2px;
      height: 32px;
      background: var(--border);
      margin: 0 auto;
      position: relative;
    }

    .dt-arrow::after {
      content: '▼';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: var(--muted);
    }

    .dt-fork {

    <script>
      document.addEventListener("DOMContentLoaded",function(){
          var bs=document.querySelectorAll('.phase-block'),ns=document.querySelectorAll('.wf-n');
          function act(n){ bs.forEach(function(b){b.classList.remove('active')}); ns.forEach(function(x){x.classList.remove('active')});
              document.querySelectorAll('.phase-block[data-num="'+n+'"]').forEach(function(b){b.classList.add('active')});
              document.querySelectorAll('.wf-n[data-num="'+n+'"]').forEach(function(x){x.classList.add('active')});
          }
          bs.forEach(function(b){ b.addEventListener('click',function(){act(b.dataset.num)}); b.addEventListener('mouseenter',function(){act(b.dataset.num)}); });
          ns.forEach(function(x){ x.addEventListener('click',function(){act(x.dataset.num)}); x.addEventListener('mouseenter',function(){act(x.dataset.num)}); });
          act("input");
      });
    </script>

    <script>
        // Scroll fade-in logic
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    </script>
